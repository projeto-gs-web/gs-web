<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Syncopate&family=Megrim&family=Rationale&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/style.css">
    <title>QUIZ</title>
</head>
<body>

    <div class="menu">
        <nav>
            <div class="tema-btns">
                <button class="tema-btn tema-btn-dourado ativo"
                        onclick="trocarTema('')" title="Tema Dourado"></button>
                <button class="tema-btn tema-btn-espacial"
                        onclick="trocarTema('tema-espacial')" title="Tema Espacial"></button>
                <button class="tema-btn tema-btn-metalico"
                        onclick="trocarTema('tema-metalico')" title="Tema Metálico"></button>
                <button class="tema-btn tema-btn-verde" 
                        onclick="trocarTema('tema-verde')" title="Tema Verde"></button>
            </div>
        </nav>
    </div>

    <div id="tela-inicio">
        <h6>Quiz T.A.P.S</h6>
        <p class="sub">Teste seus conhecimentos sobre o Tank Acoustic Predictive System.</p>

        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="text" id="email" placeholder="Digite seu email">

        <p id="erro" class="erro oculto">Preencha o nome e o email para continuar</p>

        <button class="btn1" onclick="comecarQuiz()">Iniciar quiz</button>
    </div>

    <div id="pergunta-container" class="oculto">
        <p id="progresso"></p>
        <h2 id="pergunta-texto"></h2>
        <div id="btn-container" class="botoes"></div>
    </div>

    <div id="resultado-container" class="oculto">
        <h2 id="resultado-texto">Sua pontuação foi 0/10!</h2>
        <button onclick="reiniciar()">Jogar Novamente</button>
    </div>

    <script src="../src/js/script.js"></script>
</body>
</html>
